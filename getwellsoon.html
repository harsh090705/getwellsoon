<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Get Well Soon</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(to top right, #e0f7fa, #ffe0f0);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
    }

    .board {
      background-color: #fff3cd;
      color: #d63384;
      padding: 20px 40px;
      border: 3px solid #ffc107;
      border-radius: 15px;
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 50px;
      animation: bounce 1s infinite alternate;
    }

    .flower-bed {
      display: flex;
      gap: 30px;
      position: relative;
    }

    .flower {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: pop 0.6s ease-out forwards;
      opacity: 0;
    }

    .stem {
      width: 6px;
      height: 60px;
      background: green;
      border-radius: 3px;
    }

    .petal {
      width: 30px;
      height: 30px;
      background: hotpink;
      border-radius: 50%;
      margin-top: -15px;
      border: 2px solid deeppink;
    }

    .flower:nth-child(1) { animation-delay: 0s; }
    .flower:nth-child(2) { animation-delay: 0.3s; }
    .flower:nth-child(3) { animation-delay: 0.6s; }
    .flower:nth-child(4) { animation-delay: 0.9s; }
    .flower:nth-child(5) { animation-delay: 1.2s; }

    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      80% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); }
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-10px); }
    }
  </style>
</head>
<body>

  <div class="board">💐 Get Well Soon!</div>

  <div class="flower-bed">
    <div class="flower">
      <div class="stem"></div>
      <div class="petal"></div>
    </div>
    <div class="flower">
      <div class="stem"></div>
      <div class="petal"></div>
    </div>
    <div class="flower">
      <div class="stem"></div>
      <div class="petal"></div>
    </div>
    <div class="flower">
      <div class="stem"></div>
      <div class="petal"></div>
    </div>
    <div class="flower">
      <div class="stem"></div>
      <div class="petal"></div>
    </div>
  </div>

</body>
</html>
